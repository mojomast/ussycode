# Multi-node deployment inventory
# Replace *_IP with actual server IP addresses.
#
# Usage:
#   ansible-playbook site.yml -i inventory/multi-node.ini

[control_plane]
control-01 ansible_host=CONTROL_IP ansible_user=root

[agent_nodes]
agent-01 ansible_host=AGENT1_IP ansible_user=root
agent-02 ansible_host=AGENT2_IP ansible_user=root

[all:vars]
ussycode_domain=ussyco.de
ussycode_acme_email=admin@ussyco.de
ussycode_zfs_pool=vmpool
ussycode_zfs_device=/dev/sdb
