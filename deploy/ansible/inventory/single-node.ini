# Single-node deployment inventory
# Replace YOUR_SERVER_IP with your actual server IP address.
#
# Usage:
#   ansible-playbook site.yml -i inventory/single-node.ini
#   ansible-playbook site.yml  # (default inventory per ansible.cfg)

[control_plane]
ussycode-01 ansible_host=YOUR_SERVER_IP ansible_user=root

[control_plane:vars]
ussycode_domain=ussyco.de
ussycode_acme_email=admin@ussyco.de
ussycode_zfs_pool=vmpool
ussycode_zfs_device=/dev/sdb
