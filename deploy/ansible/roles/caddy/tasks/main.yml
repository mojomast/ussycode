---
# roles/caddy/tasks/main.yml — Install and configure internal-only Caddy reverse proxy

- name: Install dependencies for Caddy repo
  ansible.builtin.apt:
    name:
      - debian-keyring
      - debian-archive-keyring
      - apt-transport-https
      - curl
    state: present
  tags: [caddy, packages]

- name: Add Caddy GPG key
  ansible.builtin.shell: |
    curl -1sLf 'https://dl.cloudsmith.io/public/caddy/stable/gpg.key' | \
      gpg --dearmor -o /usr/share/keyrings/caddy-stable-archive-keyring.gpg
  args:
    creates: /usr/share/keyrings/caddy-stable-archive-keyring.gpg
  tags: [caddy, packages]

- name: Add Caddy apt repository
  ansible.builtin.shell: |
    curl -1sLf 'https://dl.cloudsmith.io/public/caddy/stable/debian.deb.txt' | \
      tee /etc/apt/sources.list.d/caddy-stable.list
  args:
    creates: /etc/apt/sources.list.d/caddy-stable.list
  tags: [caddy, packages]

- name: Update apt cache after adding Caddy repo
  ansible.builtin.apt:
    update_cache: yes
  tags: [caddy, packages]

- name: Install Caddy
  ansible.builtin.apt:
    name: caddy
    state: present
  tags: [caddy, packages]

- name: Ensure Caddy config directories exist
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner | default('root') }}"
    group: "{{ item.group | default('root') }}"
    mode: "{{ item.mode }}"
  loop:
    - { path: /etc/caddy, mode: '0755' }
    - { path: /etc/systemd/system/caddy.service.d, mode: '0755' }
    - { path: /var/lib/caddy/.local/share/caddy, owner: '{{ caddy_service_user }}', group: '{{ caddy_service_group }}', mode: '0700' }
    - { path: /var/lib/caddy/.config/caddy, owner: '{{ caddy_service_user }}', group: '{{ caddy_service_group }}', mode: '0700' }
  tags: [caddy, config]

- name: Deploy internal-only Caddyfile
  ansible.builtin.template:
    src: Caddyfile.j2
    dest: /etc/caddy/Caddyfile
    owner: root
    group: root
    mode: "0644"
    validate: "caddy validate --config %s --adapter caddyfile"
  notify: reload caddy
  tags: [caddy, config]

- name: Deploy Caddy systemd override for internal listeners
  ansible.builtin.copy:
    dest: /etc/systemd/system/caddy.service.d/override.conf
    owner: root
    group: root
    mode: "0644"
    content: |
      [Service]
      Environment=CADDY_ADMIN={{ caddy_admin_listen }}
  notify:
    - daemon reload
    - restart caddy
  tags: [caddy, config]

- name: Enable and start Caddy
  ansible.builtin.systemd:
    name: caddy
    enabled: yes
    state: started
    daemon_reload: yes
  tags: [caddy, service]

- name: Verify Caddy admin API is running
  ansible.builtin.uri:
    url: "http://{{ caddy_admin_listen }}/config/"
    method: GET
    status_code: [200]
    timeout: 10
  register: caddy_health
  retries: 3
  delay: 5
  until: caddy_health.status == 200
  tags: [caddy, verify]
