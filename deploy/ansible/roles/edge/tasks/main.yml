---
- name: Install nginx for the public edge
  ansible.builtin.apt:
    name: nginx
    state: present
  tags: [edge, packages]

- name: Ensure Caddy can listen on internal port
  ansible.builtin.lineinfile:
    path: /etc/default/caddy
    regexp: '^#?CADDY_LISTEN='
    line: 'CADDY_LISTEN={{ caddy_site_listen }}'
    create: yes
  notify: restart caddy
  tags: [edge, config]

- name: Deploy edge nginx TLS site
  ansible.builtin.copy:
    dest: /etc/nginx/sites-enabled/ussy-edge.conf
    content: |
      server {
          listen 443 ssl;
          listen [::]:443 ssl;
          server_name {{ ussycode_domain }} *.{{ ussycode_domain }};

          ssl_certificate /etc/letsencrypt/live/ussy.host/fullchain.pem;
          ssl_certificate_key /etc/letsencrypt/live/ussy.host/privkey.pem;
          include /etc/letsencrypt/options-ssl-nginx.conf;
          ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

          location / {
              proxy_pass http://{{ caddy_backend }};
              proxy_set_header Host $host;
              proxy_set_header X-Real-IP $remote_addr;
              proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
              proxy_set_header X-Forwarded-Proto $scheme;
              proxy_http_version 1.1;
              proxy_buffering off;
          }
      }
  notify: reload nginx
  tags: [edge, config]

- name: Enable edge nginx site
  ansible.builtin.file:
    src: /etc/nginx/sites-available/ussy-edge
    dest: /etc/nginx/sites-enabled/ussy-edge
    state: link
  notify: reload nginx
  tags: [edge, config]

- name: Disable default nginx site
  ansible.builtin.file:
    path: /etc/nginx/sites-enabled/default
    state: absent
  notify: reload nginx
  tags: [edge, config]

- name: Start nginx edge
  ansible.builtin.systemd:
    name: nginx
    enabled: yes
    state: started
    daemon_reload: yes
  tags: [edge, service]
